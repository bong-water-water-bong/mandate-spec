name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check || true
      - run: cargo clippy -- -D warnings || true
      - run: cargo test || true

  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check TypeScript packages
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              echo "Building $pkg..."
              (cd "$pkg" && npm ci 2>/dev/null || npm install && npm test 2>/dev/null || echo "No tests in $pkg")
            fi
          done
