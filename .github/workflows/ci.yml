name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mandate-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check || true
      - run: cargo clippy -- -D warnings || true
      - run: cargo test || true

  ts:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mandate-core-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci || npm install
      - run: npm test 2>/dev/null || echo "No tests defined"
